name: Update AUR

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./gradlew :Xenon:shadowJar :Xenon:packagePortable --no-daemon

      - name: Generate checksums
        working-directory: Xenon/build
        run: |
          sha256sum dist/Xenon-portable-*.zip > Xenon-portable-${{ steps.get_version.outputs.version }}.zip.sha256
          sha256sum libs/Xenon-*.jar > Xenon-${{ steps.get_version.outputs.version }}.jar.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            Xenon/build/dist/Xenon-portable-*.zip
            Xenon/build/libs/Xenon-*.jar
            Xenon/build/*.sha256

  update-aur:
    needs: [build]
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install AUR tools
        run: pacman -Sy --noconfirm base-devel git openssh pacman-contrib

      - name: Configure AUR SSH
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          useradd -m builder
          install -d -m 700 /home/builder/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/aur
          chmod 600 /home/builder/.ssh/aur
          ssh-keyscan aur.archlinux.org > /home/builder/.ssh/known_hosts
          chown -R builder:builder /home/builder/.ssh

      - name: Checkout AUR
        run: |
          runuser -u builder -- env GIT_SSH_COMMAND="ssh -i /home/builder/.ssh/aur -o IdentitiesOnly=yes" \
            git clone ssh://aur@aur.archlinux.org/xenon-mdt.git aur

      - name: Update and push AUR package
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          runuser -u builder -- bash -lc "
            cd '$GITHUB_WORKSPACE/aur'
            sed -i 's/pkgver=.*/pkgver=$VERSION/' PKGBUILD
            sed -i 's/pkgrel=.*/pkgrel=1/' PKGBUILD
            updpkgsums
            makepkg --printsrcinfo > .SRCINFO
            git config user.name 'GitHub Actions'
            git config user.email 'actions@github.com'
            if git diff --quiet -- PKGBUILD .SRCINFO; then
              echo 'AUR package is already up to date.'
            else
              git add PKGBUILD .SRCINFO
              git commit -m 'Update to v$VERSION'
              env GIT_SSH_COMMAND='ssh -i /home/builder/.ssh/aur -o IdentitiesOnly=yes' git push origin master
            fi
          "
