name: Release and Update AUR

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./gradlew :Xenon:shadowJar :Xenon:packagePortable --no-daemon

      - name: Collect release files
        working-directory: Xenon/build
        run: |
          cp dist/Xenon-portable-*.zip . 2>/dev/null || true
          cp libs/Xenon-*.jar . 2>/dev/null || true

      - name: Generate checksums
        working-directory: Xenon/build
        run: |
          sha256sum Xenon-portable-*.zip > Xenon-portable-${{ steps.get_version.outputs.version }}.zip.sha256
          sha256sum Xenon-*.jar > Xenon-${{ steps.get_version.outputs.version }}.jar.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            Xenon/build/Xenon-portable-*.zip
            Xenon/build/Xenon-*.jar
            Xenon/build/*.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts

      - name: Flatten artifacts
        run: |
          find artifacts -type f -exec mv -t . {} +
          ls -la

      - name: Generate release notes
        id: release_notes
        run: |
          cat > RELEASE_NOTE.md << EOF
          # Xenon v${{ needs.build.outputs.version }}

          A Mindustry Launcher built on the HMCL UI.

          ## Downloads

          | File | Description |
          | :--- | :---------- |
          | \`Xenon-portable-${{ needs.build.outputs.version }}.zip\` | Portable build (no JRE) |
          | \`Xenon-${{ needs.build.outputs.version }}.jar\` | Fat JAR |

          ## Quick Start

          1. Download \`Xenon-portable-${{ needs.build.outputs.version }}.zip\` and extract
          2. Windows: double-click \`Xenon.bat\`
          3. Linux/macOS: \`chmod +x Xenon.sh && ./Xenon.sh\`

          Requires Java 17+ with JavaFX.

          ## Changes

          See [CHANGELOG.md](CHANGELOG.md) for details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Xenon-portable-${{ needs.build.outputs.version }}.zip
            Xenon-${{ needs.build.outputs.version }}.jar
            Xenon-portable-${{ needs.build.outputs.version }}.zip.sha256
            Xenon-${{ needs.build.outputs.version }}.jar.sha256
          body_path: RELEASE_NOTE.md
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-aur:
    needs: [build, release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Install SSH key
        env:
          AUR_SSH_KEY_B64: ${{ secrets.AUR_SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY_B64" | base64 -d > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

      - name: Checkout AUR
        run: GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=accept-new" git clone ssh://aur@aur.archlinux.org/xenon-mdt.git aur-repo

      - name: Update PKGBUILD
        working-directory: aur-repo
        run: |
          sed -i "s/pkgver=.*/pkgver=${{ needs.build.outputs.version }}/" PKGBUILD
          sed -i "s/pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Generate SRCINFO
        working-directory: aur-repo
        run: |
          sed -i "s/pkgver = .*/pkgver = ${{ needs.build.outputs.version }}/" .SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO
          sed -i "s|xenon-mdt-[0-9.]*\.jar::|xenon-mdt-${{ needs.build.outputs.version }}.jar::|g" .SRCINFO
          sed -i "s|/v[0-9.]*/Xenon-|/v${{ needs.build.outputs.version }}/Xenon-|g" .SRCINFO
          sed -i "s|Xenon-[0-9.]*\.jar|Xenon-${{ needs.build.outputs.version }}.jar|g" .SRCINFO

      - name: Commit and push to AUR
        working-directory: aur-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to v${{ needs.build.outputs.version }}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o StrictHostKeyChecking=no" git push origin master
