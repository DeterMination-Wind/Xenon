name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            version_root="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            build_number="${BASH_REMATCH[3]}"
            version="${version_root}.${build_number}"
            tag_name="${GITHUB_REF_NAME}"
          else
            version_root="$(grep '^versionRoot=' config/project.properties | cut -d'=' -f2)"
            build_number="0"
            version="${version_root}.${build_number}"
            tag_name="v${version}"
          fi
          echo "version_root=${version_root}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-cleanup: never

      - name: Build jar and single-file exe
        shell: pwsh
        env:
          VERSION_ROOT: ${{ steps.version.outputs.version_root }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          VERSION_TYPE: stable
        run: .\gradlew.bat -g .gradle-user-home --no-daemon :Xenon:shadowJar :Xenon:packageWindowsSingleFileExe

      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item "Xenon/build/dist/Xenon.exe" "release/Xenon-$version.exe"
          Copy-Item "Xenon/build/libs/Xenon-$version.jar" "release/Xenon-$version.jar"
          $exeSha = (Get-FileHash "release/Xenon-$version.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          $jarSha = (Get-FileHash "release/Xenon-$version.jar" -Algorithm SHA256).Hash.ToLowerInvariant()
          @(
            "# Xenon $version"
            ""
            "| Asset | SHA-256 |"
            "| --- | --- |"
            "| Xenon-$version.exe | ``$exeSha`` |"
            "| Xenon-$version.jar | ``$jarSha`` |"
          ) | Set-Content -Path release/RELEASE_NOTE.md -Encoding UTF8

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Xenon-${{ steps.version.outputs.version }}-release
          path: |
            release/*.exe
            release/*.jar
            release/RELEASE_NOTE.md
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Xenon ${{ steps.version.outputs.version }}
          body_path: release/RELEASE_NOTE.md
          files: |
            release/*.exe
            release/*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
