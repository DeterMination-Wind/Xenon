name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            version_root="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            build_number="${BASH_REMATCH[3]}"
            version="${version_root}.${build_number}"
            tag_name="${GITHUB_REF_NAME}"
          else
            version_root="$(grep '^versionRoot=' config/project.properties | cut -d'=' -f2)"
            build_number="0"
            version="${version_root}.${build_number}"
            tag_name="v${version}"
          fi
          echo "version_root=${version_root}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

      - name: Build jar and single-file exe
        shell: bash
        env:
          VERSION_ROOT: ${{ steps.version.outputs.version_root }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          VERSION_TYPE: stable
        run: ./gradlew -g .gradle-user-home --no-daemon :Xenon:shadowJar :Xenon:packageWindowsSingleFileExe

      - name: Prepare release assets
        id: assets
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p release
          cp "Xenon/build/dist/Xenon.exe" "release/Xenon-${version}.exe"
          cp "Xenon/build/libs/Xenon-${version}.jar" "release/Xenon-${version}.jar"
          exe_sha="$(sha256sum "release/Xenon-${version}.exe" | cut -d' ' -f1)"
          jar_sha="$(sha256sum "release/Xenon-${version}.jar" | cut -d' ' -f1)"
          {
            echo "# Xenon ${version}"
            echo
            echo "| Asset | SHA-256 |"
            echo "| --- | --- |"
            echo "| Xenon-${version}.exe | \`${exe_sha}\` |"
            echo "| Xenon-${version}.jar | \`${jar_sha}\` |"
          } > release/RELEASE_NOTE.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: Xenon ${{ steps.version.outputs.version }}
          body_path: release/RELEASE_NOTE.md
          files: |
            release/*.exe
            release/*.jar
          fail_on_unmatched_files: true
          generate_release_notes: true
