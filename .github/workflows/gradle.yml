name: Java CI

on:
  push:
  pull_request:
    paths-ignore:
      - '**.md'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'
        java-package: 'jdk+fx'
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v5
      with:
        cache-cleanup: never
    - name: Build with Gradle
      run: ./gradlew build --no-daemon --parallel
      env:
        MICROSOFT_AUTH_ID: ${{ secrets.MICROSOFT_AUTH_ID }}
        CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
    - name: Get short SHA
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Xenon-${{ env.SHORT_SHA }}-jar
        path: Xenon/build/libs/Xenon-*.jar
        if-no-files-found: error
    - name: Upload portable zip
      uses: actions/upload-artifact@v4
      with:
        name: Xenon-${{ env.SHORT_SHA }}-portable
        path: Xenon/build/dist/Xenon-portable-*.zip
        if-no-files-found: ignore
