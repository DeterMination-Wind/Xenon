name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.console=plain -Dorg.gradle.workers.max=2
  TERM: dumb

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Show tool versions
        run: |
          java -version
          ./gradlew --version --no-daemon

      - name: Check style and translations
        run: timeout 12m ./gradlew checkstyle checkTranslations --no-daemon --max-workers=2 --console=plain --stacktrace

      - name: Run non-UI tests
        run: timeout 12m ./gradlew :XenonCore:test :XenonBoot:test --no-daemon --max-workers=2 --console=plain --stacktrace

  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Build application artifacts
        run: timeout 15m ./gradlew :Xenon:shadowJar :Xenon:packagePortable --no-daemon --max-workers=2 --console=plain --stacktrace -x test

      - name: List artifacts
        run: |
          find Xenon/build/libs -maxdepth 1 -type f -name 'Xenon-*.jar' -print
          find Xenon/build/dist -maxdepth 1 -type f -name 'Xenon-portable-*.zip' -print

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Xenon-jar-${{ github.sha }}
          path: Xenon/build/libs/Xenon-*.jar
          if-no-files-found: error

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Xenon-portable-${{ github.sha }}
          path: Xenon/build/dist/Xenon-portable-*.zip
          if-no-files-found: error
